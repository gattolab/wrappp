name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/**'
  workflow_dispatch:

jobs:
  ci:
    permissions:
      contents: write
      actions: read
      security-events: write
      packages: write
    uses: gattolab/ci-workflows/.github/workflows/reusable-workflow-ci.yml@main
    with:
      app_name: wrappp
      deployment_path: manifest/wrappp/
      build_args: --build-arg GO_VERSION=${{ vars.GO_VERSION }}
      unittest_command: "go test -short  ./internal/usecase/..."
      codeql_language: go
      go_version: ${{ vars.GO_VERSION }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
