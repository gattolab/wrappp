name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
      - '.github/**'
  workflow_dispatch:

jobs:
  build:
    uses: gattolab/infra-deployments/.github/workflows/reusable-workflow-ci.yml@main
    with:
      app_name: wrappp
      deployment_path: manifest/wrappp/
      build_args: --build-arg GO_VERSION=${{ vars.GO_VERSION }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
